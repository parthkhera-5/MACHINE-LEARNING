<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoking Details</title>
    <link rel="stylesheet" href="/static/smoking_details.css">
</head>
<body>
    <div class="home">
        <div class="main">
            <h1>Cardiovascular Risk Prediction</h1>
        </div>

        <div class="checkup">
            <p>Let's get a quick checkup to check the risk of heart disease</p>
        </div>

        <div class="main2">
            <h2>Smoking Details</h2>
        </div>

        <div class="personal">
            <form action="/smoking_detail" method="post">
                <label for="isSmoking">Do you smoke?</label><br>
                <select name="isSmoking" id="isSmoking" required>
                    <option value="" disabled selected>--Select option--</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select><br><br>

                <label for="cigsPerDay">Cigs Per Day</label><br>
                <input type="number" name="cigsPerDay" id="cigsPerDay" required><br><br>

                <div class="submit">
                    <a href="/personal_detail" class="nav-btn">Previous</a>
                    <button type="submit" class="nav-btn">Next</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
