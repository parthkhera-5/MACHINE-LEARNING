<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Details</title>
  <link rel="stylesheet" href="/static/personal_details.css" />
</head>
<body>
  <div class="home">
    <div class="main">
      <h1>Cardiovascular Risk Prediction</h1>
    </div>

    <div class="checkup">
      <p>Let's get a quick checkup to check the risk of heart disease</p>
    </div>
    
    <div class="main2">
      <h2>Personal Details</h2>
    </div>

    <div class="personal">
      <form action="/personal_detail" method="post">
        <label for="name">Enter your name</label><br />
        <input type="text" id="name" name="name" required /><br /><br />

        <label for="age">Age</label><br />
        <input type="number" name="age" id="age" required /><br /><br />

        <label for="sex">Sex</label><br />
        <select name="sex" id="sex" required>
          <option value="" disabled selected>--Select option--</option>
          <option value="1">Male</option>
          <option value="0">Female</option>
        </select><br /><br />

        <label for="education">Education</label><br />
        <select name="edu" id="edu" required>
          <option value="" disabled selected>--Select option--</option>
          <option value="0">School</option>
          <option value="1">College</option>
          <option value="2">Job Person</option>
          <option value="3">Senior Citizen</option>
        </select><br /><br />

        <div class="submit">
          <button type="submit" class="nav-btn">Next</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
