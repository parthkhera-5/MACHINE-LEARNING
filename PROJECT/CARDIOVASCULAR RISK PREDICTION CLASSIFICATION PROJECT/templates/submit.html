<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Result</title>
    <link rel="stylesheet" href="/static/submit.css">
</head>
<body>
    <div class="main">
        <h1>Test Result</h1>
    </div>

    <div class="head">
        <div class="box">
            <div class="heading"><h2>Your Score</h2></div>
            <div class="score">
                <p>{{ risk_message }}</p>
            </div>
            <a href="/" class="nav-btn">Back to Dashboard</a>
        </div>
    </div> 
</body>
</html>
