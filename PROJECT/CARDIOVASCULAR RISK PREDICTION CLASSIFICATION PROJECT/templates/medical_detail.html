<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Disease Details</title>
  <link rel="stylesheet" href="/static/medical_detail.css" />
</head>
<body>
  <div class="home">
    <div class="main">
      <h1>Cardiovascular Risk Prediction</h1>
    </div>

    <div class="checkup">
      <p>Let's get a quick checkup to check the risk of heart disease</p>
    </div>

    <div class="main2">
      <h2>Disease Details</h2>
    </div>

    <div class="personal">
      <form action="/medical_detail" method="post">
        <label>Are you taking BP Medicine?</label><br>
        <label><input type="radio" name="BPMeds" value="1"> Yes</label>
        <label><input type="radio" name="BPMeds" value="0"> No</label><br><br>

        <label>Are you suffering from Diabetes?</label><br>
        <label><input type="radio" name="diabetes" value="1"> Yes</label>
        <label><input type="radio" name="diabetes" value="0"> No</label><br><br>

        <label>Have you had a Stroke?</label><br>
        <label><input type="radio" name="prevalentStroke" value="1"> Yes</label>
        <label><input type="radio" name="prevalentStroke" value="0"> No</label><br><br>

        <label>Do you have Hypertension?</label><br>
        <label><input type="radio" name="prevalentHyp" value="1"> Yes</label>
        <label><input type="radio" name="prevalentHyp" value="0"> No</label><br><br>

        <div class="submit">
          <a href="/smoking_detail" class="nav-btn">Previous</a>
          <button type="submit" class="nav-btn">Next</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
